<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Divergence — Category & Segment Analysis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    body { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    /* ───────────────────────────────────────────
       Design System
    ─────────────────────────────────────────── */
    const COLORS = {
      navy: "#0a1628",
      deepTeal: "#0d3b47",
      teal: "#0e7a71",
      tealLight: "#12a89a",
      tealGlow: "#14d4c3",
      red: "#e63946",
      redDark: "#9b1d25",
      cream: "#f8f6f1",
      warmWhite: "#fefdfb",
      warmGrey: "#b8b2a8",
      textPrimary: "#1a1a1a",
      textSecondary: "#5a5650",
      cardBg: "rgba(255,255,255,0.65)",
      glassBorder: "rgba(255,255,255,0.3)",
    };

    const FONTS = {
      serif: "'Instrument Serif', 'Playfair Display', Georgia, serif",
      sans: "'DM Sans', sans-serif",
      mono: "'DM Mono', monospace",
    };

    const EASING = "cubic-bezier(0.16, 1, 0.3, 1)";

    /* ───────────────────────────────────────────
       useInView Hook
    ─────────────────────────────────────────── */
    function useInView(options = {}) {
      const ref = useRef(null);
      const [isInView, setIsInView] = useState(false);

      useEffect(() => {
        const element = ref.current;
        if (!element) return;

        const observer = new IntersectionObserver(
          ([entry]) => {
            if (entry.isIntersecting) {
              setIsInView(true);
              observer.unobserve(element);
            }
          },
          { threshold: options.threshold || 0.08 }
        );

        observer.observe(element);
        return () => observer.disconnect();
      }, []);

      return [ref, isInView];
    }

    /* ───────────────────────────────────────────
       Background Grid Overlay
    ─────────────────────────────────────────── */
    function GridOverlay() {
      return (
        <div style={{
          position: "fixed",
          inset: 0,
          zIndex: 0,
          pointerEvents: "none",
          backgroundImage: `
            linear-gradient(rgba(0,0,0,0.012) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0,0,0,0.012) 1px, transparent 1px)
          `,
          backgroundSize: "60px 60px",
        }} />
      );
    }

    /* ───────────────────────────────────────────
       Source Badge
    ─────────────────────────────────────────── */
    function SourceBadge({ inView, delay = 0 }) {
      return (
        <div style={{
          display: "inline-flex",
          alignItems: "center",
          gap: 7,
          padding: "5px 12px",
          borderRadius: 100,
          background: `${COLORS.teal}1a`,
          border: `1px solid ${COLORS.teal}33`,
          opacity: inView ? 1 : 0,
          transform: inView ? "translateY(0)" : "translateY(20px)",
          transition: `opacity 0.6s ease ${delay}s, transform 0.6s ease ${delay}s`,
        }}>
          <span style={{
            width: 5,
            height: 5,
            borderRadius: "50%",
            background: COLORS.tealGlow,
            display: "inline-block",
          }} />
          <span style={{
            fontFamily: FONTS.mono,
            fontSize: 10,
            fontWeight: 600,
            textTransform: "uppercase",
            letterSpacing: "0.06em",
            color: COLORS.teal,
          }}>
            AI & SAAS CONSIDERATIONS
          </span>
        </div>
      );
    }

    /* ───────────────────────────────────────────
       Hero Section
    ─────────────────────────────────────────── */
    function HeroSection() {
      const [ref, inView] = useInView({ threshold: 0.05 });

      return (
        <div ref={ref} style={{
          maxWidth: 1280,
          margin: "0 auto",
          padding: "60px 48px 16px",
        }}>
          {/* Source Badge */}
          <SourceBadge inView={inView} delay={0} />

          {/* Main Title */}
          <h1 style={{
            fontFamily: FONTS.serif,
            fontSize: "clamp(28px, 3.5vw, 46px)",
            fontWeight: 400,
            lineHeight: 1.12,
            letterSpacing: "-0.02em",
            color: COLORS.navy,
            maxWidth: 720,
            marginTop: 20,
            opacity: inView ? 1 : 0,
            transform: inView ? "translateY(0)" : "translateY(30px)",
            transition: `opacity 0.8s ${EASING} 0.1s, transform 0.8s ${EASING} 0.1s`,
          }}>
            AI Divergence{" "}
            <span style={{ color: COLORS.teal }}>By Category</span>{" "}
            and{" "}
            <span style={{ color: COLORS.teal }}>By Segment</span>
          </h1>

          {/* Subtitle */}
          <p style={{
            fontFamily: FONTS.sans,
            fontSize: 15,
            lineHeight: 1.65,
            color: COLORS.textSecondary,
            maxWidth: 600,
            marginTop: 16,
            opacity: inView ? 1 : 0,
            transform: inView ? "translateY(0)" : "translateY(20px)",
            transition: `opacity 0.7s ease 0.2s, transform 0.7s ease 0.2s`,
          }}>
            AI adoption is reshaping SaaS category dynamics — vendors positioned as{" "}
            <span style={{ fontWeight: 600, color: COLORS.navy }}>systems of action</span>{" "}
            are pulling ahead in both enterprise adoption and budget allocation.
          </p>
        </div>
      );
    }

    /* ───────────────────────────────────────────
       Main App — Section 2 placeholder for future
    ─────────────────────────────────────────── */
    function AIDivergence() {
      return (
        <div style={{
          minHeight: "100vh",
          background: `linear-gradient(180deg, ${COLORS.cream} 0%, ${COLORS.warmWhite} 50%, ${COLORS.cream} 100%)`,
          position: "relative",
          fontFamily: FONTS.sans,
        }}>
          <GridOverlay />

          <div style={{ position: "relative", zIndex: 1 }}>
            <HeroSection />

            {/* Section 2: Two-column layout will go here */}

          </div>
        </div>
      );
    }

    /* ───────────────────────────────────────────
       Mount
    ─────────────────────────────────────────── */
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<AIDivergence />);
  </script>
</body>
</html>
