<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Divergence — Category & Segment Analysis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    body { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    /* ───────────────────────────────────────────
       Design System — Dark theme (Linear/Vercel-inspired)
       Matches index.html palette
    ─────────────────────────────────────────── */
    const COLORS = {
      bg: "#0C0C0E",
      heading: "#EDEDEF",
      body: "rgba(255,255,255,0.85)",
      secondary: "rgba(255,255,255,0.55)",
      muted: "rgba(255,255,255,0.35)",
      blue: "#5B8DEF",
      teal: "#0D6E6E",
      tealLight: "#2DD4BF",
      green: "#34D399",
      red: "#EF4444",
      redLight: "#F87171",
      yellow: "#FBBF24",
      purple: "rgba(139,92,246,1)",
      cardBg: "rgba(255,255,255,0.04)",
      cardBorder: "rgba(255,255,255,0.06)",
    };

    const FONTS = {
      sans: "'Inter', -apple-system, BlinkMacSystemFont, sans-serif",
    };

    const EASING = "cubic-bezier(0.22, 1, 0.36, 1)";

    /* ───────────────────────────────────────────
       useInView Hook
    ─────────────────────────────────────────── */
    function useInView(options = {}) {
      const ref = useRef(null);
      const [isInView, setIsInView] = useState(false);

      useEffect(() => {
        const element = ref.current;
        if (!element) return;

        const observer = new IntersectionObserver(
          ([entry]) => {
            if (entry.isIntersecting) {
              setIsInView(true);
              observer.unobserve(element);
            }
          },
          { threshold: options.threshold || 0.08 }
        );

        observer.observe(element);
        return () => observer.disconnect();
      }, []);

      return [ref, isInView];
    }

    /* ───────────────────────────────────────────
       Background — Animated orbs + grid (matches index.html)
    ─────────────────────────────────────────── */
    function DynamicBackground() {
      return (
        <div style={{
          position: "fixed",
          inset: 0,
          zIndex: 0,
          overflow: "hidden",
          background: COLORS.bg,
        }}>
          {/* Orb 1 — Blue */}
          <div style={{
            position: "absolute",
            width: 700, height: 700,
            borderRadius: "50%",
            background: `radial-gradient(circle, rgba(91,141,239,0.15), transparent 70%)`,
            top: "-5%", left: "5%",
            filter: "blur(140px)",
            animation: "bgOrb1 20s ease-in-out infinite",
          }} />
          {/* Orb 2 — Teal */}
          <div style={{
            position: "absolute",
            width: 600, height: 600,
            borderRadius: "50%",
            background: `radial-gradient(circle, rgba(13,110,110,0.12), transparent 70%)`,
            top: "40%", right: "-5%",
            filter: "blur(140px)",
            animation: "bgOrb2 25s ease-in-out infinite",
          }} />
          {/* Orb 3 — Purple */}
          <div style={{
            position: "absolute",
            width: 500, height: 500,
            borderRadius: "50%",
            background: `radial-gradient(circle, rgba(139,92,246,0.08), transparent 70%)`,
            bottom: "5%", left: "30%",
            filter: "blur(140px)",
            animation: "bgOrb3 18s ease-in-out infinite",
          }} />
          {/* Grid overlay */}
          <div style={{
            position: "absolute",
            inset: 0,
            backgroundImage: `
              linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
              linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px)
            `,
            backgroundSize: "48px 48px",
            animation: "bgGrid 40s linear infinite",
          }} />
          <style>{`
            @keyframes bgOrb1 {
              0%, 100% { transform: translate(0, 0) scale(1); }
              25% { transform: translate(100px, -80px) scale(1.1); }
              50% { transform: translate(-50px, 100px) scale(0.9); }
              75% { transform: translate(70px, 50px) scale(1.05); }
            }
            @keyframes bgOrb2 {
              0%, 100% { transform: translate(0, 0) scale(1); }
              25% { transform: translate(-90px, 60px) scale(1.15); }
              50% { transform: translate(70px, -80px) scale(0.85); }
              75% { transform: translate(-60px, -40px) scale(1.1); }
            }
            @keyframes bgOrb3 {
              0%, 100% { transform: translate(0, 0) scale(1); }
              33% { transform: translate(60px, 80px) scale(1.2); }
              66% { transform: translate(-90px, -50px) scale(0.9); }
            }
            @keyframes bgGrid {
              0% { background-position: 0 0; }
              100% { background-position: 48px 48px; }
            }
          `}</style>
        </div>
      );
    }

    /* ───────────────────────────────────────────
       Source Badge
    ─────────────────────────────────────────── */
    function SourceBadge({ inView, delay = 0 }) {
      return (
        <div style={{
          display: "inline-flex",
          alignItems: "center",
          gap: 7,
          padding: "5px 14px",
          borderRadius: 100,
          background: "rgba(91,141,239,0.1)",
          border: `1px solid rgba(91,141,239,0.2)`,
          opacity: inView ? 1 : 0,
          transform: inView ? "translateY(0)" : "translateY(20px)",
          transition: `opacity 0.6s ease ${delay}s, transform 0.6s ease ${delay}s`,
        }}>
          <span style={{
            width: 5,
            height: 5,
            borderRadius: "50%",
            background: COLORS.blue,
            display: "inline-block",
          }} />
          <span style={{
            fontFamily: FONTS.sans,
            fontSize: 10,
            fontWeight: 600,
            textTransform: "uppercase",
            letterSpacing: "0.1em",
            color: COLORS.blue,
          }}>
            AI & SAAS CONSIDERATIONS
          </span>
        </div>
      );
    }

    /* ───────────────────────────────────────────
       Hero Section
    ─────────────────────────────────────────── */
    function HeroSection() {
      const [ref, inView] = useInView({ threshold: 0.05 });

      return (
        <div ref={ref} style={{
          maxWidth: 1280,
          margin: "0 auto",
          padding: "60px 48px 16px",
        }}>
          {/* Source Badge */}
          <SourceBadge inView={inView} delay={0} />

          {/* Main Title */}
          <h1 style={{
            fontFamily: FONTS.sans,
            fontSize: "clamp(28px, 3.5vw, 46px)",
            fontWeight: 800,
            lineHeight: 1.12,
            letterSpacing: "-0.03em",
            color: COLORS.heading,
            maxWidth: 720,
            marginTop: 20,
            opacity: inView ? 1 : 0,
            transform: inView ? "translateY(0)" : "translateY(30px)",
            transition: `opacity 0.8s ${EASING} 0.1s, transform 0.8s ${EASING} 0.1s`,
          }}>
            AI Divergence{" "}
            <span style={{ color: COLORS.blue }}>By Category</span>{" "}
            and{" "}
            <span style={{ color: COLORS.tealLight }}>By Segment</span>
          </h1>

          {/* Subtitle */}
          <p style={{
            fontFamily: FONTS.sans,
            fontSize: 16,
            fontWeight: 300,
            lineHeight: 1.6,
            color: COLORS.secondary,
            maxWidth: 600,
            marginTop: 16,
            opacity: inView ? 1 : 0,
            transform: inView ? "translateY(0)" : "translateY(20px)",
            transition: `opacity 0.7s ease 0.2s, transform 0.7s ease 0.2s`,
          }}>
            AI adoption is reshaping SaaS category dynamics — vendors positioned as{" "}
            <span style={{ fontWeight: 600, color: COLORS.heading }}>systems of action</span>{" "}
            are pulling ahead in both enterprise adoption and budget allocation.
          </p>
        </div>
      );
    }

    /* ───────────────────────────────────────────
       Main App
    ─────────────────────────────────────────── */
    function AIDivergence() {
      return (
        <div style={{
          minHeight: "100vh",
          position: "relative",
          fontFamily: FONTS.sans,
          color: COLORS.body,
        }}>
          <DynamicBackground />

          <div style={{ position: "relative", zIndex: 1 }}>
            <HeroSection />

            {/* Section 2: Two-column layout will go here */}

          </div>
        </div>
      );
    }

    /* ───────────────────────────────────────────
       Mount
    ─────────────────────────────────────────── */
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<AIDivergence />);
  </script>
</body>
</html>
